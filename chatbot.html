<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANAKADA-GUMI 메뉴 문의 - 챗봇</title>
    <link rel="stylesheet" href="style.css">
    <script src="menu-data.js"></script>
    <style>
        /* 챗봇 전용 스타일 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 400px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        
        #chat-header {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(230, 199, 119, 0.1));
            padding: 1.5rem;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            text-align: center;
        }
        
        #chat-header h3 {
            color: #d4af37;
            margin: 0 0 0.5rem 0;
            font-size: 1.3rem;
        }
        
        #chat-header p {
            color: #c9c9c9;
            margin: 0;
            font-size: 0.9rem;
        }
        
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .chat-message {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
        }
        
        .chat-message.user {
            align-items: flex-end;
        }
        
        .chat-message.bot {
            align-items: flex-start;
        }
        
        .message-content {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .chat-message.user .message-content {
            background: linear-gradient(135deg, #d4af37, #e6c777);
            color: #1a1a1a;
            border-bottom-right-radius: 6px;
        }
        
        .chat-message.bot .message-content {
            background: rgba(255, 255, 255, 0.1);
            color: #f5f2e8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 6px;
        }
        
        .message-time {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.3rem;
            padding: 0 0.5rem;
        }
        
        #chat-suggestions {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
        }
        
        .suggestions-title {
            color: #e6c777;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }
        
        .suggestion-button {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 0.5rem 0.8rem;
            margin: 0.3rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        
        .suggestion-button:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #d4af37;
            color: #f5f2e8;
        }
        
        #chat-input-container {
            display: flex;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            gap: 0.5rem;
        }
        
        #chat-input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #f5f2e8;
            font-size: 0.9rem;
        }
        
        #chat-input::placeholder {
            color: #888;
        }
        
        #chat-input:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.15);
        }
        
        #send-button {
            background: linear-gradient(135deg, #d4af37, #e6c777);
            color: #1a1a1a;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #send-button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
        }
        
        #send-button:before {
            content: "→";
            font-size: 1rem;
            font-weight: bold;
        }
        
        /* 스크롤바 스타일링 */
        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        
        #chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        
        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.3);
            border-radius: 2px;
        }
        
        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.5);
        }
        
        /* 모바일 최적화 */
        @media (max-width: 480px) {
            .chat-container {
                max-width: 100%;
            }
            
            #chat-header {
                padding: 1rem;
            }
            
            #chat-header h3 {
                font-size: 1.1rem;
            }
            
            .message-content {
                max-width: 85%;
                font-size: 0.9rem;
            }
            
            #chat-input-container {
                padding: 0.8rem;
            }
        }
        
        /* 애니메이션 효과 */
        .chat-message {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div id="chat-container"></div>
    </div>
    
    <script src="chatbot.js"></script>
</body>
</html>
