<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TANAKADA-GUMI | タナカダグミ - 日本料理</title>
    <link rel="stylesheet" href="style.css">
    <script src="menu-data.js"></script>
</head>
<body data-lang="ja">
    <div class="container">
        <header class="header">
            <h1 class="restaurant-name">TANAKADA-GUMI</h1>
            <div class="restaurant-name-jp">タナカダグミ</div>
            <div class="restaurant-info">
                <div>福岡の伝統日本料理店</div>
                <div>平均予算:¥25,000~30,000 | 税10% + サービス料10%別途</div>
                <div>お通し ¥1,000 | お飲み物1杯以上(未注文の場合お水代¥500)</div>
            </div>
            <div class="lang-switch">
                <a href="index.html" class="lang-btn">한국어</a>
                <a href="index-en.html" class="lang-btn">English</a>
                <a href="index-ja.html" class="lang-btn active">日本語</a>
            </div>
        </header>
        <nav class="nav">
            <a href="#course" class="nav-button">コース</a>
            <a href="#beef" class="nav-button">佐賀牛</a>
            <a href="#recommended" class="nav-button">シェフのおすすめ</a>
            <a href="#donburi" class="nav-button">丼</a>
            <a href="#hotpot" class="nav-button">鍋</a>
            <a href="#sashimi" class="nav-button">刺身</a>
            <a href="chatbot.html?lang=ja" class="nav-button">メニューお問い合わせ</a>
        </nav>

        <section id="course" class="menu-section course-section">
            <h2 class="course-title">ディナーコース</h2>
            <div class="course-price">¥22,800</div>
            <div class="course-description">季節のお造り盛り合わせ、本日の特選料理×2、季節の揚げ物、佐賀牛ヒレ肉の炭火焼き、季節の魚料理、ご飯&味噌汁、デザート</div>
        </section>
        
        <section id="beef" class="menu-section">
            <h2 data-section-title="beef"></h2>
            <div class="menu-category">
                <div data-items="beef"></div>
            </div>
        </section>
        <section id="chicken-pork" class="menu-section">
            <h2 data-section-title="chickenPork"></h2>
            <div class="menu-category">
                <div data-items="chickenPork"></div>
            </div>
        </section>
        <section id="recommended" class="menu-section">
            <h2 data-section-title="recommended"></h2>
            <div class="menu-category">
                <div data-items="recommended"></div>
            </div>
        </section>
        <section id="fish" class="menu-section">
            <h2 data-section-title="fish"></h2>
            <div class="menu-category">
                <div data-items="fish"></div>
            </div>
        </section>
        <section id="donburi" class="menu-section">
            <h2 data-section-title="donburi"></h2>
            <div class="menu-category">
                <div data-items="donburi"></div>
            </div>
        </section>
        <section id="rice" class="menu-section">
            <h2 data-section-title="rice"></h2>
            <div class="menu-category">
                <div data-items="rice"></div>
            </div>
        </section>
        <section id="hotpot" class="menu-section">
            <h2 data-section-title="hotPot"></h2>
            <div class="menu-category">
                <div data-items="hotPot"></div>
            </div>
        </section>
        <section id="sashimi" class="menu-section">
            <h2 data-section-title="sashimi"></h2>
            <div class="menu-category">
                <div data-items="sashimi"></div>
            </div>
        </section>
        <section id="special" class="menu-section">
            <h2 data-section-title="special"></h2>
            <div class="menu-category">
                <div data-items="special"></div>
            </div>
        </section>
        <section id="mini-dishes" class="menu-section">
            <h2 data-section-title="miniDishes"></h2>
            <div class="menu-category">
                <div data-items="miniDishes"></div>
            </div>
        </section>
        <section id="sauces" class="menu-section">
            <h2 data-section-title="sauces"></h2>
            <div class="menu-category">
                <div data-items="sauces"></div>
            </div>
        </section>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <button class="chatbot-toggle" onclick="openChatbot()">💬</button>

    <script>
    const LANG = "ja";

    function renderAll() {
        // 섹션 타이틀
        document.querySelectorAll("[data-section-title]").forEach(el => {
            const key = el.getAttribute("data-section-title");
            const cat = menuData.categories[key];
            if (cat) el.textContent = cat.title[LANG];
        });
        // 메뉴 아이템
        document.querySelectorAll("[data-items]").forEach(container => {
            const key = container.getAttribute("data-items");
            const cat = menuData.categories[key];
            if (!cat) return;
            const specialLabel = menuData.labels[LANG].specialTag;
            cat.items.forEach(item => {
                const div = document.createElement("div");
                div.className = "menu-item" + (item.dish ? "" : " no-photo");
                let html = "";
                if (item.dish) {
                    const src = `images/dishes/${item.dish}.jpg`;
                    html += `<div class="dish-photo"><img src="${src}" alt="${item[LANG]}" loading="lazy" onclick="openLightbox(this.src)"></div>`;
                }
                html += `<div class="dish-text">`;
                html += `<div class="item-name">${item[LANG]}`;
                if (item.special) html += ` <span class="special-tag">${specialLabel}</span>`;
                html += `</div>`;
                if (LANG !== "en" && item.en) html += `<div class="item-name-en">${item.en}</div>`;
                if (item.desc) html += `<div class="item-description">${item.desc[LANG] || item.desc.en || ""}</div>`;
                html += `</div>`;
                div.innerHTML = html;
                container.appendChild(div);
            });
        });
    }

    function openChatbot() {
        window.open("chatbot.html?lang=" + LANG, "_blank", "width=400,height=600,scrollbars=yes,resizable=yes");
    }
    function openLightbox(src) {
        document.getElementById("lightbox-img").src = src;
        document.getElementById("lightbox").classList.add("active");
    }
    function closeLightbox() {
        document.getElementById("lightbox").classList.remove("active");
    }
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

    document.addEventListener("DOMContentLoaded", renderAll);

    document.querySelectorAll('a[href^="#"]').forEach(a => {
        a.addEventListener("click", e => {
            e.preventDefault();
            const t = document.querySelector(a.getAttribute("href"));
            if (t) t.scrollIntoView({behavior: "smooth", block: "start"});
        });
    });
    </script>
</body>
</html>
